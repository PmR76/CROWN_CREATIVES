<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery – Crown Creatives</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/header.css">
  <link rel="stylesheet" href="/assets/css/footer.css">
  <link rel="stylesheet" href="/assets/css/home.css">

  <style>
  /* --- PAGE WRAPPER --- */
  .gallery-page-wrapper {
    max-width: 1300px;
    margin: 160px auto 80px;
    padding: 0 20px;
    text-align: center;
    position: relative;
    z-index: 3;
  }

  .gallery-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 48px;
    color: white;
    text-shadow: 0 0 18px rgba(255,255,255,0.8);
    margin-bottom: 10px;
  }

  .gallery-subtitle {
    font-size: 20px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 40px;
  }

  /* --- GRID --- */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 28px;
  }

  /* Fade‑in animation */
  .gallery-item {
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    transition: transform 0.4s ease, box-shadow 0.4s ease;

    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.8s ease forwards;
  }

  .gallery-item:nth-child(odd) { animation-delay: 0.1s; }
  .gallery-item:nth-child(even) { animation-delay: 0.2s; }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .gallery-item:hover {
    transform: scale(1.04);
    box-shadow: 0 0 30px rgba(255,255,255,0.4);
  }

  .gallery-thumb {
    width: 100%;
    padding-bottom: 75%;
    background-size: cover;
    background-position: center;
    cursor: pointer;
  }

  /* --- LIGHTBOX --- */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 9999;
  }

  .lightbox.active {
    opacity: 1;
    pointer-events: auto;
  }

  .lightbox-img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(255,255,255,0.4);
  }

  .lightbox-close {
    position: absolute;
    top: 40px;
    right: 60px;
    font-size: 48px;
    color: white;
    cursor: pointer;
    text-shadow: 0 0 12px rgba(255,255,255,0.9);
  }
  </style>

</head>
<body>
  <div class="magic-fade-overlay"></div>

  <!-- BACKGROUNDS (same as homepage) -->
  <div class="day-background"></div>
  <div class="night-background"></div>
  <div class="day-clouds"></div>
  <div class="night-nebula"></div>

  <!-- HEADER (identical to homepage) -->
  <header class="cc-header">
    <div class="cc-header-inner">

      <div class="cc-title-block">
        <img src="/assets/icons/head-crown.svg" alt="Crown Creatives Logo" class="cc-logo shimmer-crown">
        <h1 class="cc-site-title">CROWN CREATIVES</h1>
        <p class="cc-tagline">ARTISTRY · RESILIENCE · IMAGINATION</p>
      </div>

      <button class="cc-theme-toggle" id="themeToggle">
        <img src="/assets/icons/sun-moon-magic.svg" alt="Toggle Theme" class="cc-theme-icon">
      </button>

    </div>

    <nav class="cc-nav">
      <ul>
        <li><a href="/">HOME</a></li>
        <li><a href="/about.html">ABOUT</a></li>
        <li><a href="/gallery.html" class="active">GALLERY</a></li>
        <li><a href="/projects.html">PROJECTS</a></li>
        <li><a href="/videos.html">VIDEOS</a></li>
        <li><a href="/podcasts.html">PODCASTS</a></li>
        <li><a href="/blog.html">BLOG</a></li>
        <li><a href="/contact.html">CONTACT</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN GALLERY CONTENT -->
  <main>
    <div class="gallery-page-wrapper">

      <h1 class="gallery-title">Gallery</h1>
      <p class="gallery-subtitle">A curated collection of imagination, resilience, and artistry</p>

      <div id="gallery-grid" class="gallery-grid"></div>

    </div>
  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox">
    <span id="lightbox-close" class="lightbox-close">&times;</span>
    <img id="lightbox-img" class="lightbox-img" src="">
  </div>

  <!-- FOOTER (identical to homepage) -->
  <footer class="cc-footer">

    <div class="footer-icons">

      <a href="https://www.facebook.com/people/Crown-Creatives/61556386467490/" target="_blank">
        <img src="/assets/icons/facebook-magic.svg" alt="Facebook" class="footer-icon">
      </a>

      <a href="https://www.instagram.com/crown_creatives_uk/" target="_blank">
        <img src="/assets/icons/instagram-magic.svg" alt="Instagram" class="footer-icon">
      </a>

      <a href="mailto:crowncreatives@outlook.com">
        <img src="/assets/icons/email-magic.svg" alt="Email" class="footer-icon">
      </a>

      <a href="https://copilot.microsoft.com" target="_blank">
        <img src="/assets/icons/copilot-magic.svg" alt="Copilot" class="footer-icon">
      </a>

    </div>

    <button class="back-to-top" onclick="window.scrollTo({ top: 0, behavior: 'smooth' });">
      <img src="/assets/icons/up-arrow-magic.svg" alt="Back to top" class="footer-icon">
    </button>

    <div class="footer-text">
      © Crown Creatives
    </div>

  </footer>

  <!-- SCRIPTS -->
  <script src="/assets/js/theme.js"></script>

  <script>
  const galleryPath = "/assets/images/gallery/";
  const manifestURL = galleryPath + "manifest.json";

  let galleryImages = [];
  let currentIndex = 0;

  async function loadManifest() {
    try {
      const res = await fetch(manifestURL + "?v=" + Date.now());
      if (!res.ok) throw new Error("Manifest not found");

      const list = await res.json();
      return list.filter(name => name.match(/\.(jpg|jpeg|png|webp)$/i));
    } catch (err) {
      console.error("Error loading manifest:", err);
      return [];
    }
  }

  function buildGallery(images) {
    const grid = document.getElementById("gallery-grid");
    galleryImages = images;

    images.forEach((filename, index) => {
      const item = document.createElement("div");
      item.className = "gallery-item";

      const img = document.createElement("div");
      img.className = "gallery-thumb";
      img.style.backgroundImage = `url('${galleryPath}${filename}')`;

      img.addEventListener("click", () => {
        showImage(index);
        document.getElementById("lightbox").classList.add("active");
      });

      item.appendChild(img);
      grid.appendChild(item);
    });
  }

  function showImage(index) {
    currentIndex = index;
    document.getElementById("lightbox-img").src =
      galleryPath + galleryImages[currentIndex];
  }

  function showNextImage() {
    currentIndex = (currentIndex + 1) % galleryImages.length;
    showImage(currentIndex);
  }

  function showPrevImage() {
    currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
    showImage(currentIndex);
  }

  document.addEventListener("keydown", (e) => {
    const lb = document.getElementById("lightbox");
    if (!lb.classList.contains("active")) return;

    if (e.key === "Escape") lb.classList.remove("active");
    if (e.key === "ArrowRight") showNextImage();
    if (e.key === "ArrowLeft") showPrevImage();
  });

  let startX = 0;

  document.getElementById("lightbox").addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
  });

  document.getElementById("lightbox").addEventListener("touchend", (e) => {
    const endX = e.changedTouches[0].clientX;
    const diff = endX - startX;

    if (Math.abs(diff) > 50) {
      if (diff < 0) showNextImage();
      if (diff > 0) showPrevImage();
    }
  });

  document.getElementById("lightbox-close").addEventListener("click", () => {
    document.getElementById("lightbox").classList.remove("active");
  });

  loadManifest().then(buildGallery);
  </script>

</body>
</html>
