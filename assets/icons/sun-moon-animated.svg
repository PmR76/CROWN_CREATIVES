<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sun { transform-origin: 50px 50px; animation: spin 12s linear infinite; }
    .moon { opacity: 0; transition: opacity 0.6s ease; }
    .night .moon { opacity: 1; }
    .night .sun { opacity: 0; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

  <!-- Sun -->
  <g class="sun">
    <circle cx="50" cy="50" r="18" fill="#fff"/>
    <g stroke="#fff" stroke-width="4" stroke-linecap="round">
      <line x1="50" y1="5" x2="50" y2="20"/>
      <line x1="50" y1="80" x2="50" y2="95"/>
      <line x1="5" y1="50" x2="20" y2="50"/>
      <line x1="80" y1="50" x2="95" y2="50"/>
      <line x1="22" y1="22" x2="32" y2="32"/>
      <line x1="68" y1="68" x2="78" y2="78"/>
      <line x1="22" y1="78" x2="32" y2="68"/>
      <line x1="68" y1="32" x2="78" y2="22"/>
    </g>
  </g>

  <!-- Moon -->
  <g class="moon">
    <path d="M65 50c0 14-11 25-25 25a25 25 0 0 1 0-50c14 0 25 11 25 25z"
          fill="#fff"/>
  </g>
</svg>
