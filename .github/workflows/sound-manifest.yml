name: Generate Sound Manifest

on:
  push:
    paths:
      - "assets/sounds/**"
      - ".github/workflows/sound-manifest.yml"
  workflow_dispatch:

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate sound-manifest.json
        run: |
          echo "Scanning sounds folder..."
          mkdir -p assets/sounds

          # Build JSON array of filenames
          FILES=$(ls assets/sounds | grep -iE "\.mp3$" | jq -R -s -c 'split("\n")[:-1]')

          # Write manifest
          echo "{ \"sounds\": $FILES }" > assets/sounds/sound-manifest.json

          echo "Generated manifest:"
          cat assets/sounds/sound-manifest.json

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add assets/sounds/sound-manifest.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update sound-manifest.json"
            git push
          fi
