name: Build Gallery Manifest

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build gallery manifest
        run: node scripts/build-gallery-manifest.js

      - name: Commit manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add assets/images/gallery/manifest.json
          git commit -m "Auto-update gallery manifest" || echo "No changes"
          git push
