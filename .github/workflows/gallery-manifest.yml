name: Build Gallery Manifest

on:
  push:
    paths:
      - "assets/images/gallery/**"
      - ".github/workflows/gallery-manifest.yml"
  workflow_dispatch:

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate gallery-manifest.json
        run: |
          cd assets/images/gallery
          echo "{" > gallery-manifest.json
          echo '  "images": [' >> gallery-manifest.json

          first=true
          for file in *.jpg *.jpeg *.png *.webp 2>/dev/null; do
            if [ -f "$file" ]; then
              if [ "$first" = true ]; then
                echo "    \"${file}\"" >> gallery-manifest.json
                first=false
              else
                echo "    ,\"${file}\"" >> gallery-manifest.json
              fi
            fi
          done

          echo "  ]" >> gallery-manifest.json
          echo "}" >> gallery-manifest.json

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/images/gallery/gallery-manifest.json
          git commit -m "Auto-update gallery manifest" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
