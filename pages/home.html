<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crown Creatives — Imagination Becomes Reality</title>

  <link rel="stylesheet" href="/master/css/master.css">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/header.css">
  <link rel="stylesheet" href="/assets/css/home.css">
  <link rel="stylesheet" href="/assets/css/footer.css">

</head>

<body>

<!-- CINEMATIC BACKGROUND -->
<div id="cc-background">
  <div class="day-background"></div>
  <div class="night-background"></div>
  <div class="day-clouds"></div>
  <div class="night-nebula"></div>
</div>

<!-- HERO SECTION -->
<section class="hero-section">

  <div class="hero-flex">

    <!-- LEFT GALLERY -->
    <div class="gallery-lane gallery-left">
      <div class="gallery-lane-inner"></div>
    </div>

    <!-- CROWN -->
    <div class="hero-crown-wrapper">
      <img src="/assets/icons/day-crown.svg" alt="Day Crown" class="hero-crown crown-day">
      <img src="/assets/icons/night-crown.svg" alt="Night Crown" class="hero-crown crown-night">
    </div>

    <!-- RIGHT GALLERY -->
    <div class="gallery-lane gallery-right">
      <div class="gallery-lane-inner"></div>
    </div>

  </div>

  <!-- TAGLINE CARDS -->
  <section class="tagline-cards">
    <div class="tag-card">
      <h3>Artistry</h3>
      <p>Creativity expressed through craft, vision, and imagination.</p>
    </div>

    <div class="tag-card">
      <h3>Resilience</h3>
      <p>Strength to rise, rebuild, and transform challenges into growth.</p>
    </div>

    <div class="tag-card">
      <h3>Imagination</h3>
      <p>The spark that turns ideas into reality and stories into worlds.</p>
    </div>
  </section>

</section>

<script src="/master/js/master.js"></script>

</body>
</html>
